<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>主流智能体开发框架 · 实时对比</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- 引入 Chart.js 用于雷达图 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container">
  <header>
    <h1>🤖 主流智能体开发框架 · 实时对比</h1>
    <div class="controls-row">
      <div class="refresh-row">
        <span class="last-updated" id="updateTime">正在加载数据...</span>
        <button class="refresh-btn" id="refreshDataBtn">🔄 刷新数据</button>
        <button class="dark-toggle" id="darkModeToggle">🌙 深色模式</button>
      </div>
    </div>
  </header>

  <div class="view-controls" id="viewControls">
    <button class="view-btn active" data-view="cards">📇 卡片</button>
    <button class="view-btn" data-view="list">📋 列表</button>
    <button class="view-btn" data-view="matrix">📊 能力矩阵</button>
    <button class="view-btn" data-view="scenarios">📋 场景速查</button>
    <button class="view-btn" data-view="llm-freedom">🎯 LLM自由度</button>
    <button class="view-btn" data-view="architecture">🏛️ 分层架构</button>
    <button class="view-btn" data-view="radar">📡 选型雷达图</button>   <!-- 新增 -->
  </div>

  <div id="contentArea">
    <div class="loading-indicator">⏳ 正在加载数据...</div>
  </div>
</div>

<div class="modal" id="detailModal">
  <div class="modal-content" id="modalContent">
    <button class="close-btn" id="closeModalBtn">&times;</button>
    <div id="modalInner"></div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
