    :root {
      --bg: #f5f7fb;
      --card-bg: #ffffff;
      --text: #1a202c;
      --text-secondary: #4a5568;
      --border: #e2e8f0;
      --shadow: 0 8px 24px rgba(0,0,0,0.04);
      --hover-shadow: 0 16px 32px rgba(0,0,0,0.08);
      --accent: #2563eb;
      --accent-light: #eef2ff;
      --header-gradient: linear-gradient(135deg, #2563eb, #7c3aed);
      --badge-bg: #eef2ff;
      --badge-text: #4338ca;
      --btn-bg: #f1f5f9;
      --btn-hover: #e2e8f0;
      --table-header-bg: #f8fafc;
      --modal-overlay: rgba(0,0,0,0.3);
      --star-color: #f59e0b;
      --check-color: #16a34a;
      --partial-color: #d97706;
      --cross-color: #dc2626;
      --bar-bg: #e2e8f0;
      --bar-fill: #2563eb;
    }
    body.dark {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #e2e8f0;
      --text-secondary: #94a3b8;
      --border: #334155;
      --shadow: 0 8px 24px rgba(255,255,255,0.04);
      --hover-shadow: 0 16px 32px rgba(255,255,255,0.06);
      --accent: #3b82f6;
      --accent-light: #1e3a5f;
      --badge-bg: #1e3a5f;
      --badge-text: #93c5fd;
      --btn-bg: #334155;
      --btn-hover: #475569;
      --table-header-bg: #1e293b;
      --modal-overlay: rgba(0,0,0,0.6);
      --bar-bg: #334155;
      --bar-fill: #3b82f6;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', 'Noto Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      transition: background 0.3s, color 0.3s;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem 1.8rem;
    }
    header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      gap: 1rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      background: var(--header-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .controls-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.8rem;
    }
    .view-controls {
      display: flex;
      gap: 0.4rem;
      background: var(--card-bg);
      border-radius: 3rem;
      padding: 0.35rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .view-btn {
      padding: 0.5rem 1.2rem;
      border: none;
      background: transparent;
      border-radius: 2rem;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-secondary);
    }
    .view-btn.active {
      background: var(--accent);
      color: white;
      box-shadow: 0 4px 12px rgba(37,99,235,0.3);
    }
    .refresh-row {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    .last-updated {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    .refresh-btn, .dark-toggle {
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      transition: background 0.2s;
      color: var(--text);
      box-shadow: var(--shadow);
    }
    .refresh-btn:hover, .dark-toggle:hover {
      background: var(--btn-hover);
    }
    .frameworks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 1.5rem;
      margin-top: 1rem;
    }
    .card {
      background: var(--card-bg);
      border-radius: 1.4rem;
      padding: 1.4rem;
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--hover-shadow);
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-bottom: 0.8rem;
    }
    .org-badge {
      font-size: 0.7rem;
      font-weight: 600;
      background: var(--badge-bg);
      color: var(--badge-text);
      padding: 0.2rem 0.7rem;
      border-radius: 2rem;
    }
    .card-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin: 0.3rem 0 0.2rem;
      color: var(--text);
    }
    .stars {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.9rem;
      color: var(--star-color);
      font-weight: 600;
    }
    .meta {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin: 0.5rem 0;
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }
    .meta span {
      background: var(--btn-bg);
      padding: 0.2rem 0.6rem;
      border-radius: 1rem;
    }
    .desc {
      font-size: 0.9rem;
      color: var(--text);
      margin: 0.5rem 0 0.7rem;
      flex: 1;
    }
    .detail-btn, .rank-detail-btn {
      margin-top: auto;
      background: var(--btn-bg);
      border: none;
      padding: 0.5rem;
      border-radius: 2rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 0.85rem;
      color: var(--text);
    }
    .detail-btn:hover, .rank-detail-btn:hover {
      background: var(--btn-hover);
    }
    .list-table, .matrix-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card-bg);
      border-radius: 1.2rem;
      overflow: hidden;
      box-shadow: var(--shadow);
      margin-top: 1rem;
      font-size: 0.9rem;
      border: 1px solid var(--border);
    }
    .list-table th, .matrix-table th {
      background: var(--table-header-bg);
      padding: 1rem;
      text-align: left;
      font-weight: 600;
      color: var(--text);
      border-bottom: 1px solid var(--border);
    }
    .list-table td, .matrix-table td {
      padding: 0.8rem 1rem;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    .list-table tr:hover td {
      background: var(--btn-bg);
    }
    .matrix-table th:first-child, .matrix-table td:first-child {
      text-align: left;
      font-weight: 500;
    }
    .matrix-group-header {
      background: var(--accent-light);
      font-weight: 700;
      color: var(--accent);
      text-align: left;
      padding: 0.7rem 1rem;
    }
    .check { color: var(--check-color); font-weight: bold; }
    .partial { color: var(--partial-color); }
    .cross { color: var(--cross-color); }

    .ranking-container {
      background: var(--card-bg);
      border-radius: 1.2rem;
      padding: 1.5rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      margin-top: 1rem;
    }
    .bar-chart {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .bar-row {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .bar-label {
      width: 180px;
      font-weight: 600;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }
    .bar-track {
      flex: 1;
      background: var(--bar-bg);
      border-radius: 1rem;
      height: 24px;
      overflow: hidden;
      position: relative;
    }
    .bar-fill {
      height: 100%;
      background: var(--bar-fill);
      border-radius: 1rem;
      transition: width 0.4s ease;
      width: 0%;
    }
    .bar-value {
      min-width: 80px;
      text-align: right;
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--star-color);
    }
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: var(--modal-overlay);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: var(--card-bg);
      border-radius: 1.8rem;
      padding: 2rem;
      max-width: 650px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 30px 60px rgba(0,0,0,0.2);
      position: relative;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .close-btn {
      position: absolute;
      top: 1rem;
      right: 1.4rem;
      background: none;
      border: none;
      font-size: 1.6rem;
      cursor: pointer;
      color: var(--text-secondary);
    }
    .framework-name {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text);
    }
    .framework-features { margin: 1rem 0; padding-left: 1.2rem; }
    .framework-features li { margin-bottom: 0.4rem; }
    .github-link {
      display: inline-block;
      margin-top: 1rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      border: 1px solid var(--accent);
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      transition: background 0.2s;
    }
    .github-link:hover {
      background: var(--accent);
      color: white;
    }
    @media (max-width: 640px) {
      .container { padding: 1rem; }
      .view-controls { flex-wrap: wrap; }
      header { flex-direction: column; align-items: flex-start; }
      .bar-label { width: 120px; font-size: 0.8rem; }
    }
    .loading-indicator {
      text-align: center;
      padding: 2rem;
      color: var(--text-secondary);
    }
  </style>
</head>

</div>

        shortDesc: '轻量高性能多模态Agent框架，内置记忆与知识库，AgentOS监控。',
        longDesc: 'Agno 前身为 Phidata，2025年重塑为高性能 Agentic AI 运行时。设计原则简单、快速、无关，提供内置 UI 与监控面板。',
        features: ['极速实例化', '内置知识库', 'AgentOS监控', '多模态支持'],
        capabilities: {

        },
        latestVersion: null,
        latestReleaseDate: null,
        stars: null,
        npmDownloads: null
      }

    let currentView = 'cards';
    let frameworkData = [];
    let previousData = null;
    const contentArea = document.getElementById('contentArea');
    const updateTimeSpan = document.getElementById('updateTime');
    const modal = document.getElementById('detailModal');
    const modalInner = document.getElementById('modalInner');

    function formatNumber(num) {
      if (num === undefined || num === null) return '--';
      if (num >= 1000) return (num/1000).toFixed(1) + 'k';
      return num.toString();
    }

    function formatDate(dateStr) {
      if (!dateStr) return '--';
      const d = new Date(dateStr);
      return d.toLocaleDateString('zh-CN', { year:'numeric', month:'short', day:'numeric' });
    }

    // 加载静态 data.json
    async function loadAllData() {
      updateTimeSpan.textContent = '正在从 data.json 加载...';
      try {
        const res = await fetch('./data.json');
        if (!res.ok) throw new Error('data.json 加载失败');
        const freshData = await res.json();
        frameworkData = freshData;
        previousData = freshData;
        const now = new Date();
        updateTimeSpan.textContent = `✅ 数据基于 data.json（${now.toLocaleTimeString()}）`;
        renderView();
      } catch (error) {
        console.error('加载失败，使用本地回退数据:', error);
        updateTimeSpan.textContent = '⚠️ 离线模式，使用内置数据';
        frameworkData = frameworksFallback;
        previousData = frameworksFallback;
        renderView();
      }
    }

    function renderView() {
      if (!frameworkData.length) {
        contentArea.innerHTML = '<div class="loading-indicator">暂无数据</div>';
        return;
      }
      if (currentView === 'cards') renderCards();
      else if (currentView === 'list') renderList();
      else if (currentView === 'matrix') renderMatrix();
      else if (currentView === 'ranking') renderRanking();
    }

    function renderCards() {
      let html = '<div class="frameworks-grid">';
      frameworkData.forEach(fw => {
        const starsDisplay = fw.stars !== null ? formatNumber(fw.stars) : '--';
        const npmText = fw.npmDownloads ? `📦 npm月下载 ${formatNumber(fw.npmDownloads)}` : '';
        html += `
          <div class="card">
            <div class="card-header">
              <span class="org-badge">${fw.org}</span>
              <span class="stars">⭐ ${starsDisplay}</span>
            </div>
            <div class="card-title">${fw.name}</div>
            <div class="meta">
              <span>📅 ${fw.firstRelease}</span>
              <span>🔖 ${fw.latestVersion || '--'}</span>
              <span>🧬 ${fw.languages.join(', ')}</span>
            </div>
            <div class="desc">${fw.shortDesc}</div>
            ${npmText ? `<div style="font-size:0.8rem;">${npmText}</div>` : ''}
            <button class="detail-btn" data-id="${fw.id}">查看详细介绍 →</button>
          </div>`;
      });
      html += '</div>';
      contentArea.innerHTML = html;
      document.querySelectorAll('.detail-btn').forEach(btn => {
        btn.addEventListener('click', (e) => showDetail(e.target.getAttribute('data-id')));
      });
    }

    function renderList() {
      let html = `
        <table class="list-table">
          <thead><tr>
            <th>框架</th><th>维护方</th><th>发布时间</th><th>最新版本</th><th>版本发布日期</th><th>Stars</th><th>语言</th><th>简介</th><th>操作</th>
          </tr></thead><tbody>`;
      frameworkData.forEach(fw => {
        const relDate = fw.latestReleaseDate ? formatDate(fw.latestReleaseDate) : '--';
        html += `<tr>
          <td><strong>${fw.name}</strong></td>
          <td>${fw.org}</td>
          <td>${fw.firstRelease}</td>
          <td>${fw.latestVersion || '--'}</td>
          <td>${relDate}</td>
          <td>⭐ ${fw.stars !== null ? formatNumber(fw.stars) : '--'}</td>
          <td>${fw.languages.join(', ')}</td>
          <td style="max-width:200px;">${fw.shortDesc}</td>
          <td><button class="detail-btn" data-id="${fw.id}" style="padding:0.3rem 0.8rem;">详情</button></td>
        </tr>`;
      });
      html += '</tbody></table>';
      contentArea.innerHTML = html;
      document.querySelectorAll('.detail-btn').forEach(btn => {
        btn.addEventListener('click', (e) => showDetail(e.target.getAttribute('data-id')));
      });
    }

    function renderMatrix() {
      const groups = [
        { name: '🧠 智能体架构', dims: ['single_agent', 'multi_agent', 'hitl', 'streaming', 'tool_calling'] },
        { name: '🌐 模型与生态', dims: ['model_agnostic', 'mcp', 'a2a', 'visual_tools'] },
        { name: '⚙️ 工程化成熟度', dims: ['state_management', 'memory', 'persistence'] },
        { name: '📋 适用场景速查', dims: [] }
      ];
      const dimLabels = {
        single_agent: '单Agent', multi_agent: '多Agent协作', hitl: '人在循环', streaming: '流式处理',
        tool_calling: '工具调用', model_agnostic: '模型无关', mcp: 'MCP协议', a2a: 'A2A协议',
        visual_tools: '可视化/调试', state_management: '状态管理', memory: '记忆系统', persistence: '持久化'
      };
      const sceneMap = {
        'claude-agent-sdk': 'Claude生态',
        'vercel-ai-sdk': 'Web/TS应用',
        'google-adk': 'GCP/多Agent',
        'aws-strands-agents': 'AWS/企业',
        'openai-agents-sdk': 'OpenAI生态',
        'microsoft-agent-framework': 'Azure企业',
        'smolagents': 'HuggingFace/极简',
        'llama-index': '数据驱动RAG',
        'langchain': '通用基础框架',
        'langgraph': '复杂有状态流',
        'pydantic-ai': '类型安全Python',
        'pi-mono': '极简自定义引擎',
        'crewai': '角色化协作',
        'agno': '高性能轻量'
      };

      let html = '<div style="overflow-x:auto;"><table class="matrix-table"><thead><tr><th>能力维度</th>';
      frameworkData.forEach(fw => html += `<th>${fw.name}</th>`);
      html += '</tr></thead><tbody>';

      groups.forEach(group => {
        if (group.name === '📋 适用场景速查') {
          html += `<tr class="matrix-group-header"><td colspan="${frameworkData.length+1}">${group.name}</td></tr>`;
          html += '<tr><td style="text-align:left; font-weight:500;">典型场景</td>';
          frameworkData.forEach(fw => {
            html += `<td style="font-size:0.8rem;">${sceneMap[fw.id] || '—'}</td>`;
          });
          html += '</tr>';
        } else {
          html += `<tr class="matrix-group-header"><td colspan="${frameworkData.length+1}">${group.name}</td></tr>`;
          group.dims.forEach(dim => {
            html += `<tr><td>${dimLabels[dim] || dim}</td>`;
            frameworkData.forEach(fw => {
              const val = fw.capabilities[dim];
              let icon = '';
              if (val === true) icon = '<span class="check">✔️</span>';
              else if (val === 'partial') icon = '<span class="partial">◐</span>';
              else if (val === false) icon = '<span class="cross">✖️</span>';
              else icon = '<span class="cross">—</span>';
              html += `<td>${icon}</td>`;
            });
            html += '</tr>';
          });
        }
      });
      html += '</tbody></table></div>';
      contentArea.innerHTML = html;
    }

    function renderRanking() {
      const sorted = [...frameworkData].sort((a, b) => (b.stars || 0) - (a.stars || 0));
      const maxStars = sorted.length > 0 ? Math.max(...sorted.map(f => f.stars || 0), 1) : 1;
      let html = '<div class="ranking-container"><h3 style="margin-bottom:1rem;">⭐ GitHub Stars 排名对比</h3><div class="bar-chart">';
      sorted.forEach((fw, idx) => {
        const stars = fw.stars || 0;
        const percent = (stars / maxStars) * 100;
        html += `
          <div class="bar-row">
            <div class="bar-label" title="${fw.name}">${idx+1}. ${fw.name}</div>
            <div class="bar-track"><div class="bar-fill" style="width: ${percent}%;"></div></div>
            <div class="bar-value">${formatNumber(stars)}</div>
            <button class="rank-detail-btn" data-id="${fw.id}" style="margin-left:0.5rem;">详情</button>
          </div>`;
      });
      html += '</div></div>';
      contentArea.innerHTML = html;
      document.querySelectorAll('.rank-detail-btn').forEach(btn => {
        btn.addEventListener('click', (e) => showDetail(e.target.getAttribute('data-id')));
      });
    }

    function showDetail(id) {
      const fw = frameworkData.find(f => f.id === id);
      if (!fw) return;
      let capsHtml = '';
      for (let [key, val] of Object.entries(fw.capabilities)) {
        const label = {
          single_agent:'单Agent', multi_agent:'多Agent', hitl:'人在循环', streaming:'流式',
          tool_calling:'工具调用', model_agnostic:'模型无关', mcp:'MCP', a2a:'A2A',
          state_management:'状态管理', memory:'记忆', persistence:'持久化', visual_tools:'可视化'
        }[key] || key;
        const icon = val===true?'✅':val==='partial'?'⚠️':'❌';
        capsHtml += `<span style="margin-right:12px;">${icon} ${label}</span>`;
      }
      const githubUrl = `https://github.com/${fw.githubRepo}`;
      const relDate = fw.latestReleaseDate ? formatDate(fw.latestReleaseDate) : '未知';
      modalInner.innerHTML = `
        <div class="framework-name">${fw.name}</div>
        <div style="color:var(--text-secondary); margin-bottom:1rem;">${fw.org} · ${fw.category==='vendor'?'大厂框架':'开源框架'} · ${fw.license}</div>
        <p><strong>发布时间：</strong>${fw.firstRelease} | <strong>最新版本：</strong>${fw.latestVersion || '--'} (${relDate}) | ⭐ ${fw.stars!==null?formatNumber(fw.stars):'--'}</p>
        <p><strong>语言：</strong>${fw.languages.join(', ')}</p>
        <p style="margin:1rem 0; line-height:1.7;">${fw.longDesc}</p>
        <div><strong>核心特性：</strong>
          <ul class="framework-features">${fw.features.map(f=>`<li>${f}</li>`).join('')}</ul>
        </div>
        <div style="margin-top:1rem;"><strong>能力概览：</strong><br>${capsHtml}</div>
        ${fw.npmDownloads ? `<p style="margin-top:0.8rem;">📦 npm 月下载量：${formatNumber(fw.npmDownloads)}</p>` : ''}
        <a class="github-link" href="${githubUrl}" target="_blank" rel="noopener">🔗 查看 GitHub 仓库</a>
      `;
      modal.classList.add('active');
    }

    document.getElementById('closeModalBtn').addEventListener('click', () => modal.classList.remove('active'));
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });

    document.querySelectorAll('#viewControls .view-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#viewControls .view-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentView = btn.getAttribute('data-view');
        renderView();
      });
    });

    document.getElementById('refreshDataBtn').addEventListener('click', loadAllData);

    const darkToggle = document.getElementById('darkModeToggle');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (prefersDark) {
      document.body.classList.add('dark');
      darkToggle.textContent = '☀️ 浅色模式';
    }
    darkToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      darkToggle.textContent = document.body.classList.contains('dark') ? '☀️ 浅色模式' : '🌙 深色模式';
    });

    loadAllData();
    setInterval(loadAllData, 60 * 60 * 1000); // 每小时重新拉取 data.json
  })();
</script>
